triageos.testing.dataset.import-enabled=true
triageos.testing.dataset.csv-path=/Users/hardikaregmi/Desktop/hackprinceton-project/data/Disease_symptom_and_patient_profile_dataset.csv
triageos.testing.dataset.auto-load=true

# Nurse auth: prefer repo-root .env for secrets. Initial account is created only when the nurses table is empty.
triageos.jwt.secret=dev-only-change-this-to-a-long-random-secret-key!!
triageos.jwt.expiration-ms=86400000
triageos.nurse.bootstrap.username=10004567
triageos.nurse.bootstrap.password=nurse
triageos.nurse.bootstrap.display-name=Charge Nurse

# Optional: set to enable POST /api/admin/nurses (header X-Admin-Key) to register additional nurse accounts.
triageos.admin.nurse-create-key=

spring.datasource.url=jdbc:h2:mem:triageos;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
